<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;background:#fff;color:#1d1d1f}
  .card{width:1200px;height:630px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:64px 72px;position:relative}
  .bubble{display:inline-block;background:#0a84ff;color:#fff;font-size:25px;font-weight:500;line-height:1.2;
    padding:14px 24px;border-radius:26px;box-shadow:0 12px 30px rgba(10,132,255,.28);margin-bottom:34px}
  h1{font-size:82px;font-weight:600;letter-spacing:-0.035em;line-height:1;margin-bottom:24px;text-align:center}
  .sub{font-size:29px;color:#6e6e73;text-align:center;max-width:760px;line-height:1.35}
  .logos{display:flex;gap:22px;margin-top:54px}
  .logos .ic{width:80px;height:80px;border-radius:19px;overflow:hidden;background:#fff;
    box-shadow:0 2px 9px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06)}
  .logos .ic img{width:100%;height:100%;object-fit:cover;display:block}
  .domain{position:absolute;bottom:38px;font-size:22px;font-weight:600;letter-spacing:-0.01em;color:#1d1d1f}
</style>
</head>
<body>
  <div class="card">
    <span class="bubble">Did you see the agent app store?</span>
    <h1>iMessage Agent Store</h1>
    <p class="sub">The agents you can text on iOS, and the rails behind them.</p>
    <div class="logos">
      <span class="ic"><img src="logos/poke.png"></span>
      <span class="ic"><img src="logos/soar.png"></span>
      <span class="ic"><img src="logos/orchid.png"></span>
      <span class="ic"><img src="logos/ditto.png"></span>
      <span class="ic"><img src="logos/caddy.png"></span>
      <span class="ic"><img src="logos/nudge.png"></span>
      <span class="ic"><img src="logos/clera.png"></span>
    </div>
    <span class="domain">textagent.store</span>
  </div>
</body>
</html>
